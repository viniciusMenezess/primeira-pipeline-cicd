name: ci-cd
on: 
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: cat-my-code
        uses: actions/checkout@v6.0.2
      - name: dockerhub-auth
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: image-build
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: | 
            vznn/primeira-image-pipeline:v${{ github.run_number }}
            vznn/primeira-image-pipeline:latest